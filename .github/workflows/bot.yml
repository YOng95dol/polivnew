name: Hourly Political News Bot

on:
  schedule:
    # 매 시간 0분에 실행 (UTC 기준 0 * * * * 은 한국 시간으로 매시간 정각과 동일)
    - cron: '0 * * * *'
  workflow_dispatch: # GitHub 페이지에서 수동 버튼으로 실행할 수 있게 함

permissions:
  contents: write # 봇이 sent_urls.json을 업데이트(커밋)할 수 있도록 권한 부여

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser google-generativeai

    - name: Run Main Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push sent_urls.json (상태 저장)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        # 파일이 변경되었을 때만 커밋
        git add sent_urls.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls [skip ci]" && git push)

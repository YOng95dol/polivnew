name: Hourly Political News Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python (버전 3.11로 업그레이드)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies (최신 구글 라이브러리로 변경)
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser google-genai

    - name: Run Main Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push sent_urls.json
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add sent_urls.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls [skip ci]" && git push)

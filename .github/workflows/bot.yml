name: Hourly Political News Bot

on:
  schedule:
    # 한국 시간(KST) 오전 5시 ~ 11시 사이의 매 정각에만 실행
    # (UTC 기준 20시~23시, 0시~2시에 해당)
    - cron: '0 20,21,22,23,0,1,2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python (버전 3.11)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser google-genai

    - name: Run Main Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    - name: Commit and Push sent_urls.json
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add sent_urls.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent urls [skip ci]" && git push)
